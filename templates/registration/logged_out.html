{% extends "base.html" %}

{% block title %}Logged Out - ClubHub{% endblock %}

{% block content %}
<div style="border: 2px solid black; max-width: 400px; margin: 4rem auto; padding: 2.5rem; text-align: center;">
    <div style="font-size: 3rem; margin-bottom: 1rem;">👋</div>
    <h2 style="margin-bottom: 1rem;">You have been logged out.</h2>
    <p style="color: var(--text-secondary); margin-bottom: 2rem;">
        Thanks for using ClubHub! See you next time.
    </p>
    
    <a href="{% url 'login' %}" class="btn btn-primary" style="width: 100%; padding: 1rem; font-size: 1.1rem; display: block; box-sizing: border-box;">Log Back In</a>
    
    <p style="margin-top: 1.5rem;">
        <a href="{% url 'events:home' %}" style="color: var(--text-secondary); text-decoration: none;">← Return to Home</a>
    </p>
</div>
{% endblock %}
